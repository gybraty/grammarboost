services:
  - type: web
    name: grammarboost
    env: docker
    region: frankfurt
    plan: free
    dockerCommand: ""
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        value: ""
